{% extends 'base.html' %}
{% block titulo %}Login - SGIONGs{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h5 class="card-title mb-1"><i class="bi bi-shield-lock"></i> Acesso de Administrador</h5>
                <p class="text-muted small mb-4">
                    Só é necessário iniciar sessão para registar, editar ou eliminar ONGs.
                    Para apenas consultar dados, não precisa de fazer login.
                </p>
                <form method="post">
                    <input type="hidden" name="next" value="{{ next }}">
                    <div class="mb-3">
                        <label class="form-label">Utilizador</label>
                        <input type="text" name="utilizador" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" name="senha" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Entrar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
